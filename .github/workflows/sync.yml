name: Check and Sync HaGeZi to ControlD

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to sync (leave empty for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (preview only)'
        type: boolean
        required: false
        default: false
      no_cache:
        description: 'Force fresh download, ignore cache'
        type: boolean
        required: false
        default: false
      skip_check:
        description: 'Skip update check and sync unconditionally'
        type: boolean
        required: false
        default: false

concurrency:
  group: controld-sync
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has_updates: ${{ steps.set-output.outputs.updates }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore HaGeZi content cache
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/controld-hagezi-sync
          key: hagezi-content-check-${{ github.run_id }}
          restore-keys: hagezi-content-

      - name: Check for upstream changes
        id: check
        if: ${{ inputs.skip_check == false && inputs.no_cache == false }}
        env:
          CONTROLD_API_TOKEN: ${{ secrets.CONTROLD_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          output=$(./sync-hagezi.sh --check-updates 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [[ $exit_code -eq 0 ]]; then
              echo "updates=true" >> "$GITHUB_OUTPUT"
          elif [[ $exit_code -eq 1 ]]; then
              echo "updates=false" >> "$GITHUB_OUTPUT"
          else
              echo "check_error=true" >> "$GITHUB_OUTPUT"
              exit 1
          fi

      - name: Set output
        id: set-output
        run: |
          if [[ "${{ inputs.skip_check }}" == "true" || "${{ inputs.no_cache }}" == "true" ]]; then
            echo "updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "updates=${{ steps.check.outputs.updates }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Save HaGeZi content cache
        uses: actions/cache/save@v6
        with:
          path: ~/.cache/controld-hagezi-sync
          key: hagezi-content-check-${{ github.run_id }}

  sync:
    needs: check
    if: ${{ needs.check.outputs.has_updates == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Restore HaGeZi content cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/controld-hagezi-sync
          key: hagezi-content-sync-${{ github.run_id }}
          restore-keys: |
            hagezi-content-check-${{ github.run_id }}
            hagezi-content-

      - name: Run sync
        env:
          CONTROLD_API_TOKEN: ${{ secrets.CONTROLD_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE: ${{ inputs.profile }}
          DRY_RUN: ${{ inputs.dry_run }}
          NO_CACHE: ${{ inputs.no_cache }}
        run: |
          args=(--no-freshness)
          [[ "$DRY_RUN" == "true" ]] && args+=(--dry-run)
          [[ -n "$PROFILE" ]] && args+=(--profile "$PROFILE")
          [[ "$NO_CACHE" == "true" ]] && args+=(--no-cache)
          bash sync-hagezi.sh "${args[@]}"
