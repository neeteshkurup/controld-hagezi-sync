name: Cleanup workflow runs

on:
  workflow_run:
    workflows: ["Check and Sync HaGeZi to ControlD"]
    types: [completed]
  schedule:
    - cron: '19 4 1 * *'
  workflow_dispatch:
    inputs:
      force_delete_all:
        description: 'Force delete ALL runs (the latest run of each workflow is still kept)'
        type: boolean
        required: false
        default: false

permissions:
  actions: write

concurrency:
  group: cleanup-runs
  cancel-in-progress: false

jobs:
  delete-logs:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'schedule'
    steps:
      - name: Delete logs for the completed run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/logs

  delete-runs:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_run'
    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          FORCE: ${{ inputs.force_delete_all }}
          MAX_RUNS: 100
          MAX_AGE_DAYS: 30
        run: |
          cutoff=$(date -u -d "$MAX_AGE_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)

          fetch_runs() {
            local attempt max_attempts=3 delay=5
            for (( attempt=1; attempt<=max_attempts; attempt++ )); do
              if output=$(gh api --paginate "/repos/$REPO/actions/runs?status=completed&per_page=100" \
                    --jq '.workflow_runs[] | "\(.created_at)\t\(.id)\t\(.workflow_id)\t\(.name)\t\(.conclusion)"' 2>/dev/null); then
                echo "$output"
                return 0
              fi
              echo "::warning::API fetch attempt $attempt/$max_attempts failed" >&2
              if (( attempt < max_attempts )); then
                sleep "$delay"
                delay=$(( delay * 2 ))
              fi
            done
            echo "::error::Failed to fetch workflow runs after $max_attempts attempts" >&2
            return 1
          }

          mapfile -t runs < <(fetch_runs | sort -r)
          if [[ ${#runs[@]} -eq 0 ]]; then
            echo "No completed runs found (or API error). Exiting."
            exit 0
          fi
          total_runs=${#runs[@]}
          echo "Found $total_runs completed run(s); mode: $EVENT, force: ${FORCE:-false}"

          age_cleanup=false
          max_runs_cleanup=false
          if [[ "$EVENT" == "schedule" ]]; then
            age_cleanup=true
          elif [[ "$EVENT" == "workflow_dispatch" ]]; then
            age_cleanup=true
            max_runs_cleanup=true
          elif [[ "$EVENT" == "workflow_run" ]]; then
            age_cleanup=true
            max_runs_cleanup=true
          fi

          # Global threshold: if total runs exceed MAX_RUNS, aggressively clean
          # every workflow down to just its latest run.
          aggressive=false
          if [[ "$max_runs_cleanup" == "true" && $total_runs -gt $MAX_RUNS ]]; then
            aggressive=true
            echo "Global threshold exceeded ($total_runs > $MAX_RUNS); aggressive cleanup enabled"
          fi

          declare -A seen
          deleted=0
          for line in "${runs[@]}"; do
            IFS=$'\t' read -r created id wf name conclusion <<< "$line"

            if [[ -z "$id" || -z "$wf" ]]; then
              continue
            fi

            seen[$wf]=$(( ${seen[$wf]:-0} + 1 ))

            # The newest run of each workflow always survives
            if [[ ${seen[$wf]} -eq 1 ]]; then
              continue
            fi

            delete=false
            if [[ "$FORCE" == "true" ]]; then
              delete=true
            fi

            # Aggressive mode: global cap exceeded → delete all non-sentinel successful runs
            if [[ "$delete" == "false" && "$aggressive" == "true" && "$conclusion" == "success" ]]; then
              delete=true
            fi

            # Age-based cleanup (applies to both successful and failed runs)
            if [[ "$delete" == "false" && "$age_cleanup" == "true" && "$created" < "$cutoff" ]]; then
              delete=true
            fi

            if [[ "$delete" == "true" ]]; then
              if gh api --silent --method DELETE "/repos/$REPO/actions/runs/$id"; then
                echo "Deleted run $id ($name, $created)"
                deleted=$(( deleted + 1 ))
              else
                echo "::warning::Failed to delete run $id ($name)"
              fi
            fi
          done

          echo "Deleted $deleted run(s)"
